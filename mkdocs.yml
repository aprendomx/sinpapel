site_name: sinpapel
site_description: "Versioned workflows, immutable audit, and pluggable e-signatures for Django"
site_url: ""
repo_url: ""
repo_name: sinpapel
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Usage:
      - usage/index.md
      - English: usage/en.md
      - Español: usage/es.md
  - API Reference:
      - api/index.md
  - Development:
      - development/contributing.md
      - development/changelog.md
      - development/security.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

watch:
  - sinpapel
